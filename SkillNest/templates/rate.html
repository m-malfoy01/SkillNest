{% extends "base.html" %} {% block content %}

<div class="center-box">

    <div class="card p-4" style="width:400px;">

        <h3 class="mb-3 text-center">Rate {{ user.name }}</h3>

        <form method="POST">

            <!-- ⭐ Star Rating -->
            <div class="mb-3 text-center">
                <label class="mb-2">Rating</label><br>

                <div class="star-rating">
                    <span data-value="1">★</span>
                    <span data-value="2">★</span>
                    <span data-value="3">★</span>
                    <span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>

                <input type="hidden" name="score" id="rating-value" required>
            </div>

            <!-- 📝 Review -->
            <div class="mb-3">
                <textarea name="review" class="form-control" placeholder="Write a review..."></textarea>
            </div>

            <!-- 🔘 Submit -->
            <button type="submit" class="btn btn-custom w-100">Submit</button>

        </form>

    </div>

</div>

<!-- ⭐ Script -->
<script>
    const stars = document.querySelectorAll(".star-rating span");
    const ratingInput = document.getElementById("rating-value");

    stars.forEach((star, index) => {
        star.addEventListener("click", () => {
            ratingInput.value = star.getAttribute("data-value");

            stars.forEach((s, i) => {
                s.classList.toggle("active", i <= index);
            });
        });
    });
</script>

{% endblock %}
